services:
  doil_mail:
    build:
      context: .
      dockerfile: Dockerfile
    image: doil_mail:stable
    container_name: doil_mail
    hostname: doil
    domainname: mail
    healthcheck:
      test: "doveadm service status || exit 1"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
      start_interval: 5s
    networks:
      doil_proxy:
        ipv4_address: 172.24.0.253
      salt_saltnet:
    volumes:
      - type: bind
        source: ./conf/salt-startup.sh
        target: /root/salt-startup.sh
      - type: bind
        source: ./conf/startup.conf
        target: /etc/supervisor/conf.d/startup.conf
      - type: bind
        source: ./conf/salt-minion.conf
        target: /etc/supervisor/conf.d/salt-minion.conf
      - type: bind
        source: ./conf/minion.cnf
        target: /etc/salt/minion
      - sieve:/var/www/sieve
      - mail:/var/mail
networks:
  doil_proxy:
    external: true
  salt_saltnet:
    external: true
volumes:
    sieve:
    mail:
